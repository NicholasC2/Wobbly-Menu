name: Release Existing DLL

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.3)"
        required: true
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: bin/Release/net10.0/WobblyMenu.dll
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          name: Build and Release DLL

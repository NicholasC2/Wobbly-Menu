name: Release Existing DLL

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/Release/net10.0/WobblyMenu.dll
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          name: Build and Release DLL
